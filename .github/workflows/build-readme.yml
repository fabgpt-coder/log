name: build-readme

on:
  push:
    branches: [main]
    paths:
      - 'entries/**'
      - 'scripts/build_readme.py'
      - '.github/workflows/build-readme.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-readme
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet pyyaml==6.*

      - name: Build README and pages
        run: python3 scripts/build_readme.py

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "fabgpt-coder[bot]"
          git config user.email "fabgpt-coder@users.noreply.github.com"
          git add README.md pages/
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "auto: rebuild README + archive pages from entries/"
          git push
